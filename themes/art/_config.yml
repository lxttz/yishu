# Theme Config

# Header
menu:
  Home: /
  Archives: /archives
  WORKS: /categories
  About: /about
  NEWS: /news

# Logo
logo:
  url: /img/logo.png
  title: Art Theme

# Favicon
favicon: /img/favicon.ico

# Footer
footer:
  copyright: © 2026
  powered: Powered by Hexo

# Social
social:
  github: https://github.com
  twitter: https://twitter.com
  weibo: https://weibo.com

# Comment
comment:
  enable: false
  type: disqus
  shortname: your-disqus-shortname

# Analytics
analytics:
  enable: false
  type: google
  id: your-google-analytics-id

# Pagination
pagination:
  per_page: 10
  prev_text: Prev
  next_text: Next

# Excerpt
excerpt:
  enable: true
  length: 150
  more_text: Read More

# Thumbnail
thumbnail:
  enable: true
  default: /img/default.jpg

# Code Highlight
code:
  highlight: true
  theme: monokai

# MathJax
mathjax:
  enable: false

# RSS
rss:
  enable: true
  path: /atom.xml